apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: cluster-project
data:
  # Database
  DB_HOST: "postgres.cluster-project.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "notesdb"
  DB_USER: "notesuser"
  # Redis
  REDIS_HOST: "redis.cluster-project.svc.cluster.local"
  REDIS_PORT: "6379"
  # Application
  NODE_ENV: "production"
  FRONTEND_URL: "https://cinely.fr"
  BACKEND_PORT: "3000"
  # Mail (adapter selon SMTP choisi)
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
