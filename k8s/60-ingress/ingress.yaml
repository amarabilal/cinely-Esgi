apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: cluster-project
  annotations:
    # Entrypoints HTTP + HTTPS
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # Let's Encrypt via le resolver configuré dans traefik-config.yaml
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    # Redirection HTTP → HTTPS automatique
    traefik.ingress.kubernetes.io/router.middlewares: cluster-project-redirect-https@kubernetescrd
spec:
  tls:
    - hosts:
        - cinely.fr
        - www.cinely.fr
      secretName: cinely-tls
  rules:
    # Domaine principal
    - host: cinely.fr
      http:
        paths:
          # WebSocket Socket.io — routé vers le backend AVANT /api
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # API REST
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Frontend SPA (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    # www redirigé vers le même backend/frontend
    - host: www.cinely.fr
      http:
        paths:
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
# Middleware : redirection HTTP → HTTPS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: cluster-project
spec:
  redirectScheme:
    scheme: https
    permanent: true
