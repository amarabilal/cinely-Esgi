---
# ── PVC local (copie 2) ───────────────────────────────────────────────────────
# Stocke les dumps pg_dump pendant 7 jours dans le cluster.
# Copie 1 = pgdata-postgres-0 (données live)
# Copie 2 = ce PVC (dump local)
# Copie 3 = upload S3 externe via rclone (voir CronJob ci-dessous)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-storage
  namespace: cluster-project
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi

---
# ── CronJob backup 3-2-1 ─────────────────────────────────────────────────────
# Politique :
#   - Copie 1 : données live dans pgdata-postgres-0 (StatefulSet postgres)
#   - Copie 2 : dump gzip local dans backup-storage PVC (7 jours de rétention)
#   - Copie 3 : upload S3 externe via rclone (OVH/Scaleway/Backblaze)
# Schedule : tous les jours à 02:00 UTC
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-backup
  namespace: cluster-project
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            # Step 1 — pg_dump → PVC local (copie 2)
            - name: pg-dump
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  FILENAME="/backup/notesdb_$(date +%Y%m%d_%H%M%S).sql.gz"
                  echo "=== Backup démarré : $FILENAME ==="
                  PGPASSWORD=$DB_PASSWORD pg_dump \
                    -h postgres.cluster-project.svc.cluster.local \
                    -U $DB_USER \
                    -d $DB_NAME \
                    --no-password \
                  | gzip > "$FILENAME"
                  echo "=== Backup local terminé : $(ls -lh $FILENAME) ==="
                  # Rétention 7 jours
                  find /backup -name "*.sql.gz" -mtime +7 -delete
                  echo "=== Fichiers conservés en local ==="
                  ls -lh /backup/
              env:
                - name: DB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: app-config
                      key: DB_NAME
                - name: DB_USER
                  valueFrom:
                    configMapKeyRef:
                      name: app-config
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-secret
                      key: DB_PASSWORD
              volumeMounts:
                - name: backup
                  mountPath: /backup
          containers:
            # Step 2 — rclone → S3 externe (copie 3)
            - name: rclone-upload
              image: rclone/rclone:latest
              command:
                - /bin/sh
                - -c
                - |
                  # Configurer rclone dynamiquement via variables d'environnement
                  export RCLONE_CONFIG_S3_TYPE=s3
                  export RCLONE_CONFIG_S3_PROVIDER=Other
                  export RCLONE_CONFIG_S3_ACCESS_KEY_ID=$S3_ACCESS_KEY
                  export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY=$S3_SECRET_KEY
                  export RCLONE_CONFIG_S3_ENDPOINT=$S3_ENDPOINT
                  export RCLONE_CONFIG_S3_ACL=private

                  LATEST=$(ls -t /backup/*.sql.gz | head -1)
                  echo "=== Upload S3 externe (copie 3) : $LATEST ==="
                  rclone copy "$LATEST" "S3:$S3_BUCKET/$(date +%Y/%m)/"
                  echo "=== Upload terminé ==="
                  echo "=== Fichiers dans le bucket (dernier mois) ==="
                  rclone ls "S3:$S3_BUCKET/$(date +%Y/%m)/" || true
              env:
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-secret
                      key: S3_ENDPOINT
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-secret
                      key: S3_BUCKET
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-secret
                      key: S3_ACCESS_KEY
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-secret
                      key: S3_SECRET_KEY
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: backup-storage
