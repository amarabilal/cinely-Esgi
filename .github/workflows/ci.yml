name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Tests unitaires + fonctionnels ───────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: notesdb_test
          POSTGRES_USER: notesuser
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd "pg_isready -U notesuser -d notesdb_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: apps/backend

      - name: Unit tests
        run: npm test
        working-directory: apps/backend

      - name: Functional tests (Supertest)
        run: npm run test:e2e
        working-directory: apps/backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: notesdb_test
          DB_USER: notesuser
          DB_PASSWORD: testpassword
          JWT_ACCESS_SECRET: ci-access-secret-min-32-chars-long
          JWT_REFRESH_SECRET: ci-refresh-secret-min-32-chars-long
          FRONTEND_URL: http://localhost:5173
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          NODE_ENV: test
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder-not-used-in-tests
          OPENAI_API_KEY: sk-ci-placeholder-not-used-in-tests

  # ── Audit sécurité npm ────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            apps/backend/package-lock.json
            apps/frontend/package-lock.json

      - name: Audit backend
        run: npm ci && npm audit --audit-level=critical
        working-directory: apps/backend

      - name: Audit frontend
        run: npm install && npm audit --audit-level=critical
        working-directory: apps/frontend

  # ── Build + Push Docker ───────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          target: production
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            bamara3/backend-app:latest
            bamara3/backend-app:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          target: production
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            bamara3/frontend-app:latest
            bamara3/frontend-app:${{ github.sha }}
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_MATOMO_URL=${{ secrets.VITE_MATOMO_URL }}

  # ── Deploy K3s ────────────────────────────────────────────────
  deploy:
    name: Deploy K3s
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/10-config/app-configmap.yaml -n cluster-project
          kubectl apply -f k8s/40-backend/backend.yaml
          kubectl apply -f k8s/50-frontend/frontend.yaml

      - name: Rolling update
        run: |
          kubectl set image deployment/backend \
            backend=bamara3/backend-app:${{ github.sha }} \
            -n cluster-project
          kubectl set image deployment/frontend \
            frontend=bamara3/frontend-app:${{ github.sha }} \
            -n cluster-project
          kubectl rollout status deployment/backend \
            -n cluster-project --timeout=120s
          kubectl rollout status deployment/frontend \
            -n cluster-project --timeout=120s
